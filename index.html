<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НОЖ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; background: #1a2b48; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { font-family: "Arial Black", sans-serif; font-size: 72px; font-weight: 900; letter-spacing: -4px; text-transform: uppercase; color: white; margin-bottom: 10px; }
        .tagline { font-size: 16px; opacity: 0.6; margin-bottom: 60px; letter-spacing: 2px; text-transform: uppercase; }
        .sites { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .site-card { background: white; color: #222; padding: 40px 50px; border-radius: 4px; text-align: center; text-decoration: none; transition: transform 0.2s; min-width: 220px; }
        .site-card:hover { transform: translateY(-4px); }
        .site-card .num { font-size: 48px; font-weight: 900; color: #c39b6d; font-family: "Arial Black", sans-serif; }
        .site-card .name { font-size: 18px; font-weight: bold; margin-top: 8px; }
        .site-card .url { font-size: 13px; color: #888; margin-top: 6px; font-family: Arial, sans-serif; }
    </style>
</head>
<body>
    <div class="logo">НОЖ</div>
    <div class="tagline">Сайтни танланг</div>
    <div class="sites">
        <a href="https://somthing-blush.vercel.app/site1/" class="site-card">
            <div class="num">01</div>
            <div class="name">Шахсий ҳикоялар</div>
            <div class="url">mydomain.com/site1/</div>
        </a>
        <a href="https://somthing-blush.vercel.app/site2/ class="site-card">
            <div class="num">02</div>
            <div class="name">Иккинчи сайт</div>
            <div class="url">mydomain.com/site2/</div>
        </a>
    </div>
</body>
</html>
